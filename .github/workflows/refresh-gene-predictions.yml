name: Refresh gene-state trajectories

on:
  workflow_dispatch:
    inputs:
      concurrency:
        description: Parallel OpenRouter requests
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"

permissions:
  contents: write

concurrency:
  group: refresh-gene-state-trajectories
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate gene-state trajectories with 5.6 Sol
        run: node scripts/generate-gene-predictions.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GENE_PREDICTION_MODEL: openai/gpt-5.6-sol
          GENERATION_CONCURRENCY: ${{ inputs.concurrency }}

      - name: Validate gene-state data
        run: node scripts/validate-gene-predictions.mjs data/gene-predictions.json

      - name: Upload gene-state snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gene-state-trajectories
          path: data/gene-predictions.json
          if-no-files-found: error

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/gene-predictions.json; then
            echo "Gene-state data is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gene-predictions.json
          git commit -m "Refresh gene-state trajectories"
          git push
