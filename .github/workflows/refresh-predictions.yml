name: Refresh GPT world trajectories

on:
  workflow_dispatch:
    inputs:
      model:
        description: GPT model used for the batch
        required: true
        default: openai/gpt-5.6-terra
        type: choice
        options:
          - openai/gpt-5.6-terra
          - openai/gpt-5.6-sol
          - openai/gpt-5.6-luna
      concurrency:
        description: Parallel OpenRouter requests
        required: true
        default: "2"
        type: choice
        options:
          - "1"
          - "2"
          - "3"

permissions:
  contents: write

concurrency:
  group: refresh-gpt-world-trajectories
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate all trajectories
        run: node scripts/generate-predictions.mjs
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ inputs.model }}
          GENERATION_CONCURRENCY: ${{ inputs.concurrency }}

      - name: Validate prediction data
        run: node scripts/validate-predictions.mjs data/predictions.json

      - name: Upload prediction snapshot
        uses: actions/upload-artifact@v4
        with:
          name: gpt-world-trajectories
          path: data/predictions.json
          if-no-files-found: error

      - name: Commit refreshed data
        run: |
          if git diff --quiet -- data/predictions.json; then
            echo "Prediction data is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/predictions.json
          git commit -m "Refresh GPT world trajectories"
          git push
